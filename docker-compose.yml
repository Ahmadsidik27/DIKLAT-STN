services:
  stn-diklat-panel:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - FLASK_DEBUG=1
    volumes:
      - .:/app
      - ./database:/app/database
      - ./instance:/app/instance
    restart: unless-stopped
    command: gunicorn --bind 0.0.0.0:8000 --workers 2 --threads 2 --worker-class gthread --timeout 120 --access-logfile - wsgi:application
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Optional: PostgreSQL database for production
  # db:
  #   image: postgres:15
  #   environment:
  #     POSTGRES_DB: diklat_panel
  #     POSTGRES_USER: diklat_user
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  postgres_data: